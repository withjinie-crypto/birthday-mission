<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생일 미션 1</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #fff0f6;
    padding: 30px;
}

.container {
    max-width: 350px;
    margin: auto;
}

input {
    padding: 10px;
    font-size: 16px;
    width: 80%;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    font-size: 16px;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🎂 생일 미션 1</h2>
<p id="question"></p>

<input type="text" id="answer" placeholder="정답 입력">
<br>
<button onclick="check()">확인</button>

<p id="result"></p>

</div>

<script>

const quiz = [
{q:"우리의 1일", a:"이천십구년일월오일"},
{q:"우리의 베이비", a:"호두"},
{q:"첫 해외여행지", a:"일본"},
{q:"체코에서 딩동의 최고 음식", a:"코젤흑맥주"},
{q:"밤마다 지은이가 하는 것", a:"코골기"},
{q:"여름 딩동의 최애", a:"생맥주"},
{q:"최근 아기가 울면서 먹은 것", a:"돼지귀"},
{q:"딩동특화문제, 요즘 핫한 해협이다", a:"호르무즈해협"}
];

const failMessages = [
"😏 사랑이 부족한 것 같은데...?",
"🥴 몇년 더 사귀어야 알겠군…",
"💔 다시 생각해보자...",
"😈 힌트: 나를 더 사랑해"
];

let step = 0;

function loadQuestion() {
    document.getElementById("question").innerText = (step+1)+". "+quiz[step].q;
    document.getElementById("answer").value = "";
}

function check() {
    const input = document.getElementById("answer").value;

    if (input === quiz[step].a) {
        step++;

        if (step < quiz.length) {
            document.getElementById("result").innerText = "✅ 정답!";
            setTimeout(() => {
                document.getElementById("result").innerText = "";
                loadQuestion();
            }, 800);
        } else {
            document.getElementById("result").innerHTML =
            "🎉 하하! 대단하군, 역시 사랑꾼인가..💖<br><br>사랑꾼씨, 문 앞에 박스가 하나 도착했을걸세, 조심히 뜯어보시게나! BOOOOM💣🧨💥 뜯은 후 죽지 않았다면 카톡으로 생사여부를 알려주게나😈";
        }

    } else {
        const msg = failMessages[Math.floor(Math.random() * failMessages.length)];
        document.getElementById("result").innerText = msg;
    }
}

loadQuestion();

</script>

</body>
</html>
