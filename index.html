<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생일 미션 1 - 십자 퍼즐</title>

<style>
body { font-family: sans-serif; text-align: center; background: #fff0f6; }
.grid { display: inline-block; margin-top: 20px; }
.row { display: flex; justify-content: center; }
.cell { position: relative; }

input {
    width: 36px;
    height: 36px;
    text-align: center;
    font-size: 18px;
    margin: 1px;
}

.block { background: #ccc; }

.number {
    position: absolute;
    top: 1px;
    left: 3px;
    font-size: 10px;
    color: #555;
}

.clue {
    text-align: left;
    width: 320px;
    margin: 20px auto;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>🎂 생일 미션 1</h2>
<p>십자 퍼즐을 완성하시오 💖</p>

<div id="grid" class="grid"></div>

<div class="clue">
<b>📌 문제</b><br>
① 우리의 1일<br>
② 우리의 베이비<br>
③ 첫 해외여행지<br>
④ 체코에서 딩동의 최고 음식<br>
⑤ 밤마다 지은이가 하는 것<br>
⑥ 여름 딩동의 최애<br>
⑦ 최근 아기가 울면서 먹은 것<br>
⑧ 딩동특화문제, 요즘 핫한 해협이다
</div>

<button onclick="check()">정답 확인</button>
<p id="result"></p>

<script>

const layout = [
"#######1####",
"######111111",
"####2##1####",
"####2##1####",
"33333331111#",
"####4#######",
"555555######",
"####6#######",
"####77777###",
"########8###",
"########8###",
"########8###",
];

const answers = {
    1: "이천십구년일월오일",
    2: "호두",
    3: "일본",
    4: "코젤흑맥주",
    5: "코골기",
    6: "생맥주",
    7: "돼지귀",
    8: "호르무즈해협"
};

const grid = document.getElementById("grid");

layout.forEach((row, r) => {
    const div = document.createElement("div");
    div.className = "row";

    row.split("").forEach((ch, c) => {

        const wrapper = document.createElement("div");
        wrapper.className = "cell";

        if (ch === "#") {
            const block = document.createElement("input");
            block.disabled = true;
            block.className = "block";
            wrapper.appendChild(block);
        } else {
            const input = document.createElement("input");

            if (
                (r === 0 || layout[r-1][c] === "#") ||
                (c === 0 || row[c-1] === "#")
            ) {
                const num = document.createElement("div");
                num.className = "number";
                num.innerText = ch;
                wrapper.appendChild(num);
            }

            input.dataset.group = ch;
            wrapper.appendChild(input);
        }

        div.appendChild(wrapper);
    });

    grid.appendChild(div);
});

const failMessages = [
"😏 사랑이 부족한 것 같은데...?",
"🥴 몇년 더 사귀어야 알겠군…",
"💔 다시 생각해보자...",
"😈 힌트: 나를 더 사랑해"
];

function check() {

    let correct = true;

    for (let num in answers) {
        let inputs = document.querySelectorAll(`input[data-group='${num}']`);
        let word = "";

        inputs.forEach(i => word += i.value);

        if (word !== answers[num]) {
            correct = false;
        }
    }

    if (correct) {
        document.getElementById("result").innerHTML =
        "🎉 하하! 대단하군, 역시 사랑꾼인가..💖<br><br>사랑꾼씨, 티비 옆 박스를 찾아보게나";
    } else {
        const msg = failMessages[Math.floor(Math.random() * failMessages.length)];
        document.getElementById("result").innerHTML = msg;
    }
}

</script>

</body>
</html>
