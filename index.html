<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생일 미션 1 - 십자 퍼즐</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #fff0f6;
}

.grid {
    display: inline-block;
    margin-top: 20px;
}

.row {
    display: flex;
    justify-content: center;
}

.cell {
    position: relative;
}

input {
    width: 38px;
    height: 38px;
    text-align: center;
    font-size: 18px;
    margin: 2px;
}

.black {
    background: #ccc;
}

.number {
    position: absolute;
    top: 1px;
    left: 3px;
    font-size: 10px;
    color: #555;
}

.clue {
    text-align: left;
    width: 320px;
    margin: 20px auto;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>🎂 생일 미션 1</h2>
<p>십자 퍼즐을 완성하시오 💖</p>

<div id="grid" class="grid"></div>

<div class="clue">
<b>📌 가로/세로 문제</b><br>
① 우리의 1일<br>
② 우리의 베이비<br>
③ 첫 해외여행지<br>
④ 체코에서 딩동이의 최고 음식<br>
⑤ 내가 밤마다 하는 것<br>
⑥ 딩동의 여름 최애<br>
⑦ 최근 애기가 울면서 먹은 간식<br>
⑧ 딩동 특화 문제-해협입니다
</div>

<button onclick="check()">정답 확인</button>
<p id="result"></p>

<script>

// 퍼즐 구조 (#은 빈칸)
const layout = [
"#########",
"#1111111#",
"###2#####",
"###2#####",
"###23333#",
"###4#####",
"5555555##",
"###6#####",
"###77777#",
"#########"
];

// 정답
const answers = {
    "1": "이천십구년일월오일",
    "2": "호두",
    "3": "일본",
    "4": "코젤흑맥주",
    "5": "코골기",
    "6": "생맥주",
    "7": "돼지귀",
    "8": "호르무즈해협"
};

const grid = document.getElementById("grid");
let inputs = [];

layout.forEach((row, r) => {
    const div = document.createElement("div");
    div.className = "row";

    row.split("").forEach((cell, c) => {

        const wrapper = document.createElement("div");
        wrapper.className = "cell";

        if (cell === "#") {
            const block = document.createElement("input");
            block.disabled = true;
            block.className = "black";
            wrapper.appendChild(block);
        } else {
            const input = document.createElement("input");

            // ✅ 한글 입력 허용 (maxlength 제거)
            input.dataset.answer = cell;

            // 숫자 표시
            if (!wrapper.querySelector(".number")) {
                const num = document.createElement("div");
                num.className = "number";
                num.innerText = cell;
                wrapper.appendChild(num);
            }

            inputs.push(input);
            wrapper.appendChild(input);
        }

        div.appendChild(wrapper);
    });

    grid.appendChild(div);
});

// 실패 멘트
const failMessages = [
"😏 사랑이 부족한 것 같은데...?",
"🤨?",
"💔 다시 생각해보자...",
"😈 힌트: 나를 더 사랑해"
];

function check() {
    let allText = inputs.map(i => i.value).join("");

    if (
        allText.includes("호두") &&
        allText.includes("일본") &&
        allText.includes("코골기") &&
        allText.includes("생맥주")
    ) {
        document.getElementById("result").innerHTML =
        "🎉 하하! 대단하군, 역시 사랑꾼인가..💖<br><br>사랑꾼씨, 티비 옆 박스를 찾아보게나";
    } else {
        const msg = failMessages[Math.floor(Math.random() * failMessages.length)];
        document.getElementById("result").innerHTML = msg;
    }
}
</script>

</body>
</html>
