<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>생일 미션 1 - 십자 퍼즐</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #fff0f6;
}
.grid {
    display: inline-block;
    margin-top: 20px;
}
.row {
    display: flex;
    justify-content: center;
}
input {
    width: 35px;
    height: 35px;
    text-align: center;
    font-size: 16px;
    margin: 2px;
}
.black {
    background: #ddd;
}
.clue {
    text-align: left;
    margin: 10px auto;
    width: 300px;
}
button {
    margin-top: 20px;
    padding: 10px 20px;
}
</style>
</head>

<body>

<h2>🎂 생일 미션 1</h2>
<p>십자 퍼즐을 완성하시오 💖</p>

<div class="grid" id="grid"></div>

<div class="clue">
<b>📌 문제</b><br>
1. 우리의 1일<br>
2. 우리의 베이비<br>
3. 첫 해외여행지<br>
4. 체코에서 최고 음식<br>
5. 밤마다 하는 것<br>
6. 여름 최애<br>
7. 최근 울면서 먹은 간식<br>
8. 딩동 특화 문제
</div>

<button onclick="check()">정답 확인</button>
<p id="result"></p>

<script>

// 퍼즐 구조 (지그재그 + 일부 교차)
const layout = [
"#########",
"#1111111#",
"###2#####",
"###2#####",
"###23333#",
"###4#####",
"5555555##",
"###6#####",
"###77777#",
"#########"
];

// 정답
const answers = {
    "1": "이천십구년일월오일",
    "2": "호두",
    "3": "일본",
    "4": "코젤흑맥주",
    "5": "코골기",
    "6": "생맥주",
    "7": "돼지귀",
    "8": "호르무즈해협"
};

const grid = document.getElementById("grid");
let inputs = {};

layout.forEach((row, r) => {
    const div = document.createElement("div");
    div.className = "row";

    row.split("").forEach((cell, c) => {
        if (cell === "#") {
            const block = document.createElement("input");
            block.disabled = true;
            block.className = "black";
            div.appendChild(block);
        } else {
            const input = document.createElement("input");
            input.maxLength = 1;

            const key = r + "-" + c;
            inputs[key] = input;

            input.oninput = function() {
                if (this.value.length === 1) {
                    const next = this.nextElementSibling;
                    if (next && !next.disabled) next.focus();
                }
            };

            div.appendChild(input);
        }
    });

    grid.appendChild(div);
});

// 실패 멘트
const failMessages = [
"😏 사랑이 부족한 것 같은데...?",
"🤨 7년이라구!",
"💔 다시 생각해보자...",
"😈 힌트: 나를 더 사랑해"
];

function check() {
    // 간단 검증 (핵심 단어 포함 여부 체크)
    const text = Object.values(inputs).map(i => i.value).join("");

    if (text.includes("호두") &&
        text.includes("일본") &&
        text.includes("코골기") &&
        text.includes("생맥주")) {

        document.getElementById("result").innerHTML =
        "🎉 하하! 대단하군, 역시 사랑꾼인가..💖<br><br>사랑꾼씨, 티비 옆 박스를 찾아보게나";
    } else {
        const msg = failMessages[Math.floor(Math.random() * failMessages.length)];
        document.getElementById("result").innerHTML = msg;
    }
}
</script>

</body>
</html>
